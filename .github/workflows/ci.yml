name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Run public safety check
        run: ./scripts/verify-public-safety.sh
      - name: Run loop skill smoke checks
        run: |
          cd skills/loop-kernel
          python3 scripts/loop_kernel.py check --spec loop.yaml
          python3 scripts/canary_runner.py --spec loop.yaml
